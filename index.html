<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>INNTEO Sulas – HVAC/MaR Field Tool</title>
<link rel="manifest" href="./manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0E17;--card:#111827;--accent:#F59E0B;--accentDk:#D97706;--green:#10B981;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;--text:#F3F4F6;--dim:#9CA3AF;--muted:#6B7280;--border:#1F2937;--inp:#0D1117}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:880px;margin:0 auto;padding:12px 14px 90px}
.header{display:flex;align-items:center;gap:10px;padding:6px 0 14px}
.logo-box{width:40px;height:40px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accentDk));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.tabs{display:flex;gap:3px;overflow-x:auto;padding-bottom:10px;border-bottom:1px solid var(--border);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Courier New',monospace;transition:all .15s}
.tab.active{border:2px solid var(--accent);background:rgba(245,158,11,.12);color:var(--accent);font-weight:700}
.content{margin-top:16px}
h2.sec{color:var(--accent);font-size:18px;margin-bottom:14px;font-weight:800}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 12px}
label.lbl{display:block;font-size:11px;color:var(--dim);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
input.inp,select.inp,textarea.inp{width:100%;padding:9px 11px;background:var(--inp);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
textarea.inp{resize:vertical}
select.inp{cursor:pointer}
.field{margin-bottom:10px}
.btn{padding:10px 20px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#000}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-ghost.active{border:2px solid var(--accent);background:rgba(245,158,11,.12);color:var(--accent)}
.btn-danger{background:var(--red);color:#000}
.result-box{padding:12px;border-radius:7px;text-align:center;margin-top:8px}
.result-val{font-size:26px;font-weight:800;font-family:monospace}
.flex-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chk-item{display:flex;gap:10px;padding:10px 14px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.chk-item.done{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.25)}
.chk-box{width:20px;height:20px;min-width:20px;border-radius:5px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.chk-item.done .chk-box{background:var(--green);border-color:var(--green)}
.chk-label{font-size:12px}
.chk-item.done .chk-label{color:var(--green);text-decoration:line-through;opacity:.6}
.err-card{padding:12px;margin-bottom:8px}
.err-code{min-width:60px;padding:4px 10px;background:rgba(239,68,68,.12);border-radius:6px;font-family:monospace;font-weight:800;color:var(--red);font-size:14px;text-align:center}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.accordion{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.accordion.open{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.25)}
.acc-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.acc-head span{color:var(--text);font-weight:700;font-size:13px}
.acc-toggle{color:var(--accent);transition:transform .2s}
.accordion.open .acc-toggle{transform:rotate(45deg)}
.acc-body{padding:0 14px 12px;font-family:monospace;font-size:11px;line-height:1.8;color:var(--dim);white-space:pre-wrap}
.code-block{background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;color:#E5E7EB;overflow-x:auto;white-space:pre;margin:8px 0}
.code-kw{color:#F59E0B}
.code-cm{color:#6B7280;font-style:italic}
.code-str{color:#10B981}
.code-type{color:#3B82F6}
table.data-table{width:100%;border-collapse:collapse;font-size:11px}
table.data-table th{padding:8px 10px;text-align:left;color:var(--accent);font-weight:700;border-bottom:2px solid var(--border);background:rgba(245,158,11,.08)}
table.data-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.sig-canvas{background:var(--inp);border:1px solid var(--border);border-radius:7px;touch-action:none;cursor:crosshair;display:block;max-width:100%}
.diag-option{padding:12px 16px;background:var(--inp);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;text-align:left;cursor:pointer;transition:all .15s;display:block;width:100%;margin-bottom:6px}
.diag-option:hover{border-color:var(--accent);background:rgba(245,158,11,.06)}
.info-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-right:4px}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}
@media(min-width:768px){
  .app{max-width:1100px;padding:16px 24px 90px}
  .tabs{gap:4px}
  .tab{padding:9px 16px;font-size:12px}
  .card{padding:20px}
  .grid2{grid-template-columns:1fr 1fr}
  .grid3{grid-template-columns:1fr 1fr 1fr}
  .grid4{grid-template-columns:1fr 1fr 1fr 1fr}
}
@media(min-width:1024px){
  .app{max-width:1200px}
  .grid2{gap:0 20px}
  .grid3{gap:0 20px}
}
.mat-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.mat-row.header{font-weight:700;color:var(--accent);font-size:11px;text-transform:uppercase;border-bottom:2px solid var(--border)}
.mat-row input,.mat-row select{padding:6px 8px;background:var(--inp);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;outline:none;width:100%}
.mat-total{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:14px;margin-top:12px;text-align:right;font-size:16px;font-weight:800;color:var(--accent)}
@media(max-width:600px){.mat-row{grid-template-columns:1fr 1fr;gap:4px}.mat-row.header{display:none}}
</style>

{title:"1. Základy CODESYS pro MaR",content:`CODESYS = Controller Development System
Prostředí IEC 61131-3 pro programování PLC / řídících jednotek.
Podporované platformy: WAGO, Beckhoff, Domat, Festo, ABB...

JAZYK PROGRAMOVÁNÍ – co se kdy používá v MaR:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• ST (Structured Text) – hlavní jazyk, podobný Pascalu
  → Regulace, výpočty, logika, komunikace
• FBD (Function Block Diagram) – grafický, propojování bloků
  → Přehledné pro jednoduché logiky, vizuální návrh
• LD (Ladder Diagram) – žebříčkový, z elektrotechniky
  → Jednoduché ON/OFF logiky, stykače
• SFC (Sequential Function Chart) – stavový diagram
  → Sekvenční řízení (náběh/doběh VZT, kaskáda kotlů)

Každý projekt má PROGRAM → FUNCTION BLOCK → FUNCTION:
• PROGRAM (PRG) = hlavní cyklicky volaná jednotka
• FUNCTION BLOCK (FB) = opakovaně použitelný blok se stavem
• FUNCTION (FUN) = bez stavu, vrací hodnotu`},

{title:"3. Čtení vstupů – AI / DI",content:`ANALOGOVÝ VSTUP (AI) – 4-20 mA / 0-10 V:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Typická struktura v CODESYS:`,
code:`// Přepočet RAW hodnoty z AI modulu na fyzikální veličinu
// AI modul vrací typicky 0-32767 (INT) pro 4-20 mA

PROGRAM ReadAnalogInputs
VAR
  wAI_TempSupply_Raw  : WORD;    // surová hodnota z modulu
  rTemp_Supply        : REAL;    // přepočtená teplota [°C]
  rPressure_HP        : REAL;    // přepočtený tlak [bar]
  wAI_PressHP_Raw     : WORD;
  
  // Konstanty pro přepočet
  rAI_RawMin : REAL := 0;       // 4 mA = 0
  rAI_RawMax : REAL := 32767;   // 20 mA = 32767
END_VAR

// Přepočet teploty: čidlo 4-20 mA, rozsah -20..+80 °C
rTemp_Supply := (WORD_TO_REAL(wAI_TempSupply_Raw) - rAI_RawMin) 
                / (rAI_RawMax - rAI_RawMin) 
                * (80.0 - (-20.0)) + (-20.0);

// Přepočet tlaku: čidlo 4-20 mA, rozsah 0..25 bar
rPressure_HP := (WORD_TO_REAL(wAI_PressHP_Raw) - rAI_RawMin)
                / (rAI_RawMax - rAI_RawMin) 
                * 25.0;`,
content2:`
DIGITÁLNÍ VSTUP (DI) – kontakty ON/OFF:`,
code2:`VAR
  xDI_HP_Presostat  : BOOL;  // HP presostat (NC kontakt!)
  xDI_LP_Presostat  : BOOL;  // LP presostat (NC kontakt!)

END_VAR

3-BODOVÉ ŘÍZENÍ SERVOPOHONU (otevři/zavři):`,
code2:`VAR
  rSetpoint      : REAL := 50.0;  // požadovaná teplota
  rActual        : REAL;          // skutečná teplota
  rDeadband      : REAL := 1.0;   // pásmo necitlivosti
  xServo_Open    : BOOL;          // DO: otevři
  xServo_Close   : BOOL;          // DO: zavři
END_VAR

IF rActual < (rSetpoint - rDeadband) THEN
  xServo_Open  := TRUE;   // pod SP → otevři (topení)
  xServo_Close := FALSE;
ELSIF rActual > (rSetpoint + rDeadband) THEN
  xServo_Open  := FALSE;
  xServo_Close := TRUE;   // nad SP → zavři
ELSE
  xServo_Open  := FALSE;  // v pásmu → stůj
  xServo_Close := FALSE;
END_IF;`},

{title:"5. PID regulace – jádro MaR",content:`PID REGULÁTOR – základní stavební kámen:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

P  = Kp × e(t)              → proporcionální složka
I  = Ki × ∫e(t)dt           → integrační (odstraní trvalou odchylku)  
D  = Kd × de(t)/dt          → derivační (tlumí překmit)

e(t) = Setpoint − Actual    → regulační odchylka

TYPICKÉ PARAMETRY PRO HVAC:`,
code:`// PID regulátor pro teplotu přívodní vody
FUNCTION_BLOCK FB_PID_Simple
VAR_INPUT
  rSetpoint    : REAL;     // požadovaná hodnota [°C]
  rActual      : REAL;     // skutečná hodnota [°C]  
  rKp          : REAL := 5.0;   // zesílení
  rTi          : REAL := 120.0; // integrační čas [s]
  rTd          : REAL := 0.0;   // derivační čas [s]
  rOutMin      : REAL := 0.0;   // min výstup [%]
  rOutMax      : REAL := 100.0; // max výstup [%]
  xEnable      : BOOL := TRUE;
END_VAR
VAR_OUTPUT
  rOutput      : REAL;     // výstup 0-100% 
END_VAR
VAR
  rError       : REAL;     // odchylka
  rIntegral    : REAL;     // integrál
  rDerivative  : REAL;
  rPrevError   : REAL;
  rCycleTime   : REAL := 1.0; // [s]
END_VAR

IF NOT xEnable THEN
  rOutput := 0.0;
  rIntegral := 0.0;
  RETURN;
END_IF;

rError := rSetpoint - rActual;

// Integrační složka (s anti-windup)
IF rTi > 0.0 THEN
  rIntegral := rIntegral + rError * rCycleTime / rTi;
  rIntegral := LIMIT(-100.0, rIntegral, 100.0);
END_IF;

// Derivační složka
IF rTd > 0.0 THEN
  rDerivative := (rError - rPrevError) / rCycleTime * rTd;
END_IF;

// Výstup
rOutput := rKp * (rError + rIntegral + rDerivative);
rOutput := LIMIT(rOutMin, rOutput, rOutMax);

rPrevError := rError;`,
content2:`
DOPORUČENÉ PARAMETRY PID PRO HVAC:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Teplota vody (směšování):  Kp=3-8,  Ti=60-180s,  Td=0
Teplota vzduchu VZT:       Kp=5-15, Ti=90-300s,  Td=0-30s
Teplota prostoru:          Kp=2-5,  Ti=300-600s,  Td=0
Tlak v potrubí:            Kp=1-3,  Ti=10-30s,   Td=0
Vlhkost:                   Kp=2-5,  Ti=120-300s,  Td=0

⚠️ Začni VŽDY jen s P, pak přidej I, nakonec D!`},

{title:"6. Řízení VZT jednotky",content:`TYPICKÝ PROGRAM PRO VZT JEDNOTKU:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Sekvenční náběh → regulace → doběh → ochrana`,
code:`PROGRAM PLC_PRG_AHU
VAR
  // Stavy
  iState          : INT := 0;  // 0=Stop,1=Náběh,2=Provoz,3=Doběh
  xCmd_Start      : BOOL;      // příkaz START
  
  // Vstupy  
  rTemp_Supply    : REAL;      // teplota přívodu [°C]
  rTemp_Extract   : REAL;      // teplota odtahu [°C]
  rTemp_Outdoor   : REAL;      // venkovní teplota [°C]
  xDI_Filter_Dirty: BOOL;     // diferenční presostat filtru
  xDI_Frost       : BOOL;     // protimrazový termostat
  
  // Výstupy
  xDO_Fan_Supply  : BOOL;     // přívodní ventilátor
  xDO_Fan_Extract : BOOL;     // odtahový ventilátor
  rAO_Damper      : REAL;     // směšovací klapka [%]
  rAO_HeatValve   : REAL;     // topný ventil [%]
  rAO_CoolValve   : REAL;     // chladicí ventil [%]
  
  // Setpointy  
  rSP_Supply      : REAL := 22.0;  // požadovaná teplota přívodu
  
  // Timery
  fbTON_Startup   : TON;      // zpoždění náběhu
  fbTON_Shutdown  : TON;      // zpoždění doběhu
END_VAR

CASE iState OF
  0: // STOP
    xDO_Fan_Supply  := FALSE;
    xDO_Fan_Extract := FALSE;
    rAO_Damper      := 0.0;   // klapka zavřena
    rAO_HeatValve   := 0.0;
    rAO_CoolValve   := 0.0;
    
    IF xCmd_Start THEN
      iState := 1;  // → NÁBĚH
    END_IF;

  1: // NÁBĚH
    rAO_Damper := 100.0;      // otevři klapku
    fbTON_Startup(IN := TRUE, PT := T#30s);
    
    IF fbTON_Startup.Q THEN   // po 30s → start ventilátory
      xDO_Fan_Supply  := TRUE;
      xDO_Fan_Extract := TRUE;
      iState := 2;  // → PROVOZ
      fbTON_Startup(IN := FALSE);
    END_IF;

  2: // PROVOZ – regulace
    // Protimrazová ochrana!
    IF xDI_Frost THEN
      rAO_HeatValve := 100.0; // plné topení
      // Pokud trvá → stop
    END_IF;
    
    // Jednoduchá sekvenční regulace (topení → chlazení)
    IF rTemp_Supply < (rSP_Supply - 1.0) THEN
      rAO_HeatValve := LIMIT(0.0, rAO_HeatValve + 2.0, 100.0);
      rAO_CoolValve := 0.0;
    ELSIF rTemp_Supply > (rSP_Supply + 1.0) THEN
      rAO_HeatValve := 0.0;
      rAO_CoolValve := LIMIT(0.0, rAO_CoolValve + 2.0, 100.0);
    END_IF;
    
    IF NOT xCmd_Start THEN
      iState := 3;  // → DOBĚH
    END_IF;

  3: // DOBĚH
    rAO_HeatValve := 0.0;
    rAO_CoolValve := 0.0;
    fbTON_Shutdown(IN := TRUE, PT := T#60s);
    
    IF fbTON_Shutdown.Q THEN
      xDO_Fan_Supply  := FALSE;
      xDO_Fan_Extract := FALSE;
      rAO_Damper      := 0.0;
      iState := 0;
      fbTON_Shutdown(IN := FALSE);
    END_IF;
END_CASE;`},

  xBoiler1_Cmd    : BOOL;
  xBoiler2_Cmd    : BOOL;
  fbTON_Stage2    : TON;       // zpoždění 2. stupně
  rHysteresis     : REAL := 3.0;
END_VAR

// 1. stupeň – základní kotel
IF rTemp_Return < (rSP_Return - rHysteresis) THEN
  xBoiler1_Cmd := TRUE;
ELSIF rTemp_Return > rSP_Return THEN
  xBoiler1_Cmd := FALSE;
END_IF;

// 2. stupeň – po prodlevě, pokud 1. nestačí
fbTON_Stage2(
  IN := xBoiler1_Cmd AND 
        (rTemp_Return < (rSP_Return - rHysteresis * 2)),
  PT := T#300s  // 5 minut čekání
);

IF fbTON_Stage2.Q THEN
  xBoiler2_Cmd := TRUE;
ELSIF rTemp_Return > (rSP_Return - rHysteresis) THEN
  xBoiler2_Cmd := FALSE;
END_IF;`,

{title:"8. Modbus komunikace",content:`MODBUS RTU – nejčastější protokol v MaR:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

RS-485 : 2 vodiče (A+, B-) + GND
Adresa : 1-247 (0 = broadcast)
Baudrate: 9600 / 19200 / 38400
Parity : Even (standard), None
Stop bits: 1 (s paritou), 2 (bez)

FUNCTION CODES (FC):
━━━━━━━━━━━━━━━━━━
FC 01 : Read Coils            (DO – čtení)
FC 02 : Read Discrete Inputs  (DI – čtení)
FC 03 : Read Holding Registers (AO/nastavení – čtení)
FC 04 : Read Input Registers   (AI/měření – čtení)
FC 05 : Write Single Coil     (DO – zápis)
FC 06 : Write Single Register  (AO – zápis)
FC 15 : Write Multiple Coils
FC 16 : Write Multiple Registers

REGISTRY:
━━━━━━━━
Coils (0xxxx)         : 1-bit, R/W  → digitální výstupy
Discrete Input (1xxxx): 1-bit, R    → digitální vstupy
Input Register (3xxxx): 16-bit, R   → analogové vstupy  
Holding Register (4xxxx): 16-bit, R/W → nastavení, setpointy

POZOR NA OFFSET:
Adresa v dokumentaci "40001" = registr 0 (Holding)
Adresa "30001" = registr 0 (Input)
→ Některé systémy počítají od 0, jiné od 1!

ŠKÁLOVÁNÍ:
Teplota 23.5°C v registru = 235 (×10)
Tlak 12.34 bar = 1234 (×100)
Vždy kontrolovat datasheet zařízení!`},

{title:"9. Alarmy a ochranné funkce",content:`OCHRANNÉ FUNKCE – povinné v HVAC/MaR:`,
code:`// Protimrazová ochrana vodního ohřívače VZT
FUNCTION_BLOCK FB_FrostProtection
VAR_INPUT
  rTemp_Water_Return : REAL;   // teplota zpátečky vody
  rTemp_Air_After    : REAL;   // teplota vzduchu za ohřívačem
  xDI_FrostThermostat: BOOL;  // kontaktní protimraz
END_VAR
VAR_OUTPUT
  xAlarm_Frost       : BOOL;  // alarm namrzání
  xCmd_EmergencyHeat : BOOL;  // nouzové topení 100%
  xCmd_StopFans      : BOOL;  // zastavit ventilátory
  xCmd_CloseDamper   : BOOL;  // zavřít klapky
END_VAR

// Trojitá ochrana:
// 1. Kontaktní termostat (nejrychlejší, ~5°C)
// 2. Teplota vody zpátečky < 15°C
// 3. Teplota vzduchu za ohřívačem < 5°C

xAlarm_Frost := (NOT xDI_FrostThermostat) 
             OR (rTemp_Water_Return < 15.0)
             OR (rTemp_Air_After < 5.0);

IF xAlarm_Frost THEN
  xCmd_EmergencyHeat := TRUE;  // ventil 100%
  xCmd_StopFans      := TRUE;  // stop ventilátory
  xCmd_CloseDamper   := TRUE;  // zavřít klapky
END_IF;`,

// ── RENDER ENGINE ──────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});
  return el;
}

function render(){
  const app=document.getElementById("app");

}

// Helper to create field
function field(label,key,obj,type="text",placeholder="",gridSpan=""){
  const d=h("div",{className:"field",style:gridSpan?{gridColumn:gridSpan}:{}});
  if(label)d.append(h("label",{className:"lbl"},label));
  const inp=h(type==="textarea"?"textarea":"input",{className:"inp",type:type==="textarea"?"text":type,value:obj[key]||"",placeholder,onInput:(e)=>{obj[key]=e.target.value;},rows:type==="textarea"?"3":undefined});
  if(type==="textarea")inp.setAttribute("rows","3");
  d.append(inp);
  return d;
}

function selectField(label,key,obj,options,onChange){
  const d=h("div",{className:"field"});
  if(label)d.append(h("label",{className:"lbl"},label));
  const sel=h("select",{className:"inp",value:obj[key]||"",onChange:(e)=>{obj[key]=e.target.value;if(onChange)onChange(e.target.value);render();}});
  sel.append(h("option",{value:""},"— Vyberte —"));
  options.forEach(o=>{
    const val=typeof o==="string"?o:o.value;
    const lbl=typeof o==="string"?o:o.label;
    const opt=h("option",{value:val},lbl);
    if(val===obj[key])opt.selected=true;
    sel.append(opt);
  });
  d.append(sel);
  return d;
}

  function createSigPad(label, stateKey) {
    const wrap=h("div",{style:{marginBottom:"12px"}});
    wrap.append(h("label",{className:"lbl"},label));
    
    const canvasWrap=h("div",{style:{position:"relative",border:"2px solid var(--border)",borderRadius:"7px",overflow:"hidden",background:"var(--inp)",cursor:"crosshair"}});
    const canvas=h("canvas",{width:600,height:160,style:{display:"block",width:"100%",height:"auto",touchAction:"none"}});
    canvasWrap.append(canvas);
    
    // Hint text
    const hint=h("div",{style:{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",color:"var(--muted)",fontSize:"13px",pointerEvents:"none",opacity:state[stateKey]?"0":"0.5"}},"Podepište se zde");
    canvasWrap.append(hint);
    
    let drawing=false;
    let lastX=0,lastY=0;
    let scrollPos=0;
    
    function getPos(e){
      const rect=canvas.getBoundingClientRect();
      const scaleX=canvas.width/rect.width;
      const scaleY=canvas.height/rect.height;
      if(e.touches && e.touches.length>0){
        return {x:(e.touches[0].clientX-rect.left)*scaleX, y:(e.touches[0].clientY-rect.top)*scaleY};
      }
      return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
    }
    
    function startDraw(e){
      // Only prevent default on touch (to stop scroll), not on mouse
      if(e.touches){
        e.preventDefault();
        // Save scroll position and lock
        scrollPos=window.scrollY;
        document.body.style.overflow='hidden';
      }
      drawing=true;
      hint.style.opacity="0";
      const pos=getPos(e);
      lastX=pos.x; lastY=pos.y;
      // Start a dot for single clicks
      const ctx=canvas.getContext("2d");
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,1.5,0,Math.PI*2);
      ctx.fillStyle="#F59E0B";
      ctx.fill();
    }
    
    function draw(e){
      if(!drawing)return;
      if(e.touches) e.preventDefault();
      const ctx=canvas.getContext("2d");
      const pos=getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(pos.x,pos.y);
      ctx.strokeStyle="#F59E0B";
      ctx.lineWidth=2.5;
      ctx.lineCap="round";
      ctx.lineJoin="round";
      ctx.stroke();
      lastX=pos.x; lastY=pos.y;
    }
    
    function endDraw(e){
      if(!drawing)return;
      drawing=false;
      state[stateKey]=canvas.toDataURL();
      // Restore scroll
      document.body.style.overflow='';
      window.scrollTo(0,scrollPos);
    }
    
    // Mouse events
    canvas.addEventListener("mousedown",startDraw);
    // Listen on window for mouse so dragging outside canvas still works
    window.addEventListener("mousemove",function(e){if(drawing)draw(e);});
    window.addEventListener("mouseup",function(e){if(drawing)endDraw(e);});
    
    // Touch events
    canvas.addEventListener("touchstart",startDraw,{passive:false});
    canvas.addEventListener("touchmove",draw,{passive:false});
    canvas.addEventListener("touchend",endDraw);
    canvas.addEventListener("touchcancel",endDraw);
    
    // If we have saved signature, redraw it
    if(state[stateKey]){
      setTimeout(function(){
        const img=new Image();
        img.onload=function(){canvas.getContext("2d").drawImage(img,0,0);};
        img.src=state[stateKey];
      },50);
    }
    
    wrap.append(canvasWrap);
    
    const btnRow=h("div",{style:{display:"flex",gap:"6px",marginTop:"6px",alignItems:"center"}});
    btnRow.append(h("button",{className:"btn btn-sm btn-ghost",onClick:function(){
      canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
      state[stateKey]="";
      hint.style.opacity="0.5";
    }},"Vymazat"));
    if(state[stateKey]) btnRow.append(h("span",{style:{fontSize:"11px",color:"var(--green)"}},"✓ Podpis uložen"));
    wrap.append(btnRow);
    
    return wrap;
  }
  
  const sigGrid=h("div",{className:"grid2"});
  sigGrid.append(createSigPad("Podpis technika","sigTech"));
  sigGrid.append(createSigPad("Podpis zákazníka","sigClient"));
  sigCard.append(sigGrid);
  c.append(sigCard);
  
  // Print button
  const btns=h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap"}});
  btns.append(h("button",{className:"btn btn-primary",onClick:()=>printProtocol(f,ri)},"🖨️ Tisk / PDF"));
  btns.append(h("button",{className:"btn btn-sm btn-ghost",onClick:()=>{Object.keys(f).forEach(k=>f[k]=k==="serviceDate"?new Date().toISOString().split("T")[0]:"");render();}},"🗑️ Vymazat"));
  c.append(btns);
}

function printHTML(html) {
  var w = window.open('', '_blank');
  if(!w) {
    alert('Povolit vyskakovaci okna pro tuto stranku! Pak zkuste znovu.');
    return;
  }
  w.document.write(html);
  w.document.close();
  w.onload = function() {
    w.print();
  };
  // Fallback if onload doesn't fire
  setTimeout(function() { 
    try { w.print(); } catch(e) {} 
  }, 1000);
}

// Calculator functions (global)
window.calcMA=()=>{const v=parseFloat(document.getElementById("c_ma").value),mn=parseFloat(document.getElementById("c_ma_min").value),mx=parseFloat(document.getElementById("c_ma_max").value);const r=document.getElementById("c_ma_result");if(isNaN(v))return;if(v<4){r.innerHTML='<div class="result-box" style="background:rgba(239,68,68,.12)"><div class="result-val" style="color:var(--red)">WIRE BREAK!</div></div>';return;}const val=((v-4)/16)*(mx-mn)+mn;r.innerHTML=`<div class="result-box" style="background:rgba(16,185,129,.08)"><div class="result-val" style="color:var(--green)">${val.toFixed(2)}</div><div style="font-size:11px;color:var(--dim)">${(((v-4)/16)*100).toFixed(1)}%</div></div>`;};
window.calcV=()=>{const v=parseFloat(document.getElementById("c_v").value),mn=parseFloat(document.getElementById("c_v_min").value),mx=parseFloat(document.getElementById("c_v_max").value);const r=document.getElementById("c_v_result");if(isNaN(v))return;const val=(v/10)*(mx-mn)+mn;r.innerHTML=`<div class="result-box" style="background:rgba(16,185,129,.08)"><div class="result-val" style="color:var(--green)">${val.toFixed(2)}</div><div style="font-size:11px;color:var(--dim)">${((v/10)*100).toFixed(1)}%</div></div>`;};
window.calcAir=()=>{const w=parseFloat(document.getElementById("c_dw").value)/1000,ht=parseFloat(document.getElementById("c_dh").value)/1000,v=parseFloat(document.getElementById("c_vel").value);if(isNaN(w)||isNaN(ht)||isNaN(v))return;const a=w*ht;document.getElementById("c_air_result").innerHTML=`<div class="result-box" style="background:rgba(59,130,246,.08)"><div style="display:flex;justify-content:space-around"><div><div style="font-size:11px;color:var(--dim)">Plocha</div><div class="result-val" style="color:var(--blue);font-size:20px">${(a*10000).toFixed(1)} cm²</div></div><div><div style="font-size:11px;color:var(--dim)">Průtok</div><div class="result-val" style="color:var(--blue);font-size:20px">${(a*v*3600).toFixed(0)} m³/h</div></div></div></div>`;};
window.calcPwr=()=>{const f=parseFloat(document.getElementById("c_fr").value),d=parseFloat(document.getElementById("c_dt").value),m=document.getElementById("c_med").value;if(isNaN(f)||isNaN(d))return;const cp=m==="water"?4186:m==="glycol30"?3600:1005;const rho=m==="water"?1000:m==="glycol30"?1040:1.2;const pw=(f/3600)*rho*cp*d;document.getElementById("c_pwr_result").innerHTML=`<div class="result-box" style="background:rgba(139,92,246,.08)"><div class="result-val" style="color:var(--purple)">${(pw/1000).toFixed(2)} kW</div><div style="font-size:11px;color:var(--dim)">${Math.round(pw).toLocaleString()} W</div></div>`;};
window.mbD2H=()=>{const n=parseInt(document.getElementById("c_mb_dec").value);if(!isNaN(n))document.getElementById("c_mb_hex").value="0x"+n.toString(16).toUpperCase().padStart(4,"0");};
window.mbH2D=()=>{const n=parseInt(document.getElementById("c_mb_hex").value,16);if(!isNaN(n))document.getElementById("c_mb_dec").value=n;};
window.mbScale=()=>{const r=parseFloat(document.getElementById("c_mb_raw").value),s=parseFloat(document.getElementById("c_mb_scale").value);document.getElementById("c_mb_sr").textContent=(!isNaN(r)&&s!==0)?(r/s).toFixed(2):"—";};

      if(cl.email)cd2.append(h("div",{style:{fontSize:"12px",color:"var(--dim)"}},"✉️ "+cl.email));
      if(cl.notes)cd2.append(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"4px"}},"📝 "+cl.notes));
      c.append(cd2);
    });
  }
}

// ── MaR VELIČINY ───────────────────────────────────────────
function renderMAR(c){
  c.append(h("h2",{className:"sec"},"📐 MaR – Veličiny & Čidla"));
  const btns=h("div",{className:"flex-wrap"});
  MAR_VELICINY.forEach(cat=>{btns.append(h("button",{className:"btn btn-sm btn-ghost"+(state.marCat===cat.cat?" active":""),onClick:()=>{state.marCat=cat.cat;render();}},cat.icon+" "+cat.cat));});
  c.append(btns);
  
  const cat=MAR_VELICINY.find(v=>v.cat===state.marCat);
  if(!cat)return;
  cat.items.forEach(item=>{
    const cd=h("div",{className:"card",style:{padding:"14px"}});
    cd.append(h("div",{style:{fontSize:"14px",fontWeight:700,marginBottom:"8px",color:"var(--accent)"}},item.name));
    const grid=h("div",{style:{display:"grid",gridTemplateColumns:"auto 1fr",gap:"4px 12px",fontSize:"12px"}});
    grid.append(h("span",{style:{color:"var(--dim)",fontWeight:600}},"Rozsah:"));
    grid.append(h("span",null,item.range));
    grid.append(h("span",{style:{color:"var(--dim)",fontWeight:600}},"Signál:"));
    grid.append(h("span",{style:{fontFamily:"monospace",color:"var(--green)"}},item.signal));
    grid.append(h("span",{style:{color:"var(--dim)",fontWeight:600}},"Použití:"));
    grid.append(h("span",null,item.use));
    cd.append(grid);
    cd.append(h("div",{style:{marginTop:"8px",padding:"8px 10px",background:"var(--inp)",borderRadius:"6px",fontSize:"11px",color:"var(--dim)",lineHeight:"1.6"}},item.note));
    c.append(cd);
  });
}

// ── CODESYS ────────────────────────────────────────────────
function renderCodesys(c){
  c.append(h("h2",{className:"sec"},"💻 CODESYS – Programování MaR"));
  c.append(h("div",{style:{fontSize:"12px",color:"var(--dim)",marginBottom:"16px"}},"Tahák pro programování řídících systémů HVAC v CODESYS / IEC 61131-3 (Structured Text)"));
  
  CODESYS_SECTIONS.forEach((sec,i)=>{
    const acc=h("div",{className:"accordion"+(state.cdSec===i?" open":"")});
    const head=h("div",{className:"acc-head",onClick:()=>{state.cdSec=state.cdSec===i?null:i;render();}});
    head.append(h("span",null,sec.title));
    head.append(h("span",{className:"acc-toggle"},"+"));
    acc.append(head);
    if(state.cdSec===i){
      const body=h("div",{className:"acc-body"});
      if(sec.content)body.append(document.createTextNode(sec.content));
      if(sec.code)body.append(h("div",{className:"code-block"},sec.code));
      if(sec.content2)body.append(document.createTextNode(sec.content2));
      if(sec.code2)body.append(h("div",{className:"code-block"},sec.code2));
      acc.append(body);
    }
    c.append(acc);
  });
}

// ── CHEATSHEET ─────────────────────────────────────────────
const CS_ITEMS=[
{title:"4–20 mA výpočet",content:"((mA − 4) / 16) × Rozsah + Offset\nPř: 12 mA → 50 °C (rozsah 0-100)\n⚠️ Pod 4 mA = wire break"},
{title:"0–10 V výpočet",content:"(V / 10) × Rozsah + Offset\nPř: 7V → 70% klapka\n0V = zavřeno, 10V = otevřeno"},
{title:"Typy regulace",content:"ON/OFF: Kmitá kolem SP\nP: Trvalá odchylka\nPI: Odstraní trvalou odchylku\nPID: + tlumí překmit"},
{title:"Superheat (SH)",content:"SH = T_sání − T_vyp(z tlaku)\nNormál: 5–10 K\nNízký → EEV moc otevřený\nVysoký → málo chladiva"},
{title:"Subcooling (SC)",content:"SC = T_kond(z tlaku) − T_kapaliny\nNormál: 5–8 K\nNízký → málo chladiva\nVysoký → přebytek"},
{title:"AI vs DI vs AO vs DO",content:"AI: Ni1000,Pt1000,NTC,4-20mA,0-10V\nDI: HP/LP presostat, TA = ON/OFF\nAO: 0-10V (servo,FM), 4-20mA\nDO: Relé = ON/OFF"},
{title:"Protokoly",content:"Modbus RTU: RS-485, master-slave\nModbus TCP: Ethernet\nBACnet: BMS standard\nKNX: Budovy\nM-Bus: Energie"},
{title:"CO detekce",content:"⚠️ PRVNÍ: Větrat + evakuovat!\n26 ppm TWA 8h\n200 ppm = nebezpečí\nČidlo: 1,5 m výška"},
{title:"Kubický zákon (ventilátory)",content:"P₂/P₁ = (n₂/n₁)³\nPři 50% otáček → 12.5% výkonu\nProto FM = obrovská úspora!"},
{title:"COP / EER",content:"COP = Q_topení / P_el\nEER = Q_chlazení / P_el\nSCOP/SEER = sezónní\nDobrý TČ: COP > 3.5"},
];

function renderCheat(c){
  c.append(h("h2",{className:"sec"},"📖 MaR Cheatsheet"));
  CS_ITEMS.forEach((item,i)=>{
    const acc=h("div",{className:"accordion"+(state.csExp===i?" open":"")});
    const head=h("div",{className:"acc-head",onClick:()=>{state.csExp=state.csExp===i?null:i;render();}});
    head.append(h("span",null,item.title));
    head.append(h("span",{className:"acc-toggle"},"+"));
    acc.append(head);
    if(state.csExp===i)acc.append(h("div",{className:"acc-body"},item.content));
    c.append(acc);
  });
}

// ── REFRIGERANT TABLE ──────────────────────────────────────
function renderRef(c){
  c.append(h("h2",{className:"sec"},"🧊 Přehled chladiv"));
  const tbl=h("table",{className:"data-table"});
  const thead=h("thead");thead.append(h("tr",null,...["Kód","Typ","GWP","Bezp.","Poznámka"].map(t=>h("th",null,t))));tbl.append(thead);
  const tbody=h("tbody");
  REFRIGERANTS.forEach(r=>{
    const tr=h("tr",null,
      h("td",{style:{fontWeight:700,fontFamily:"monospace"}},r.code),
      h("td",{style:{color:"var(--dim)"}},r.type),
      h("td",{style:{fontFamily:"monospace",fontWeight:700,color:r.gwp>2000?"var(--red)":r.gwp>500?"var(--accent)":"var(--green)"}},r.gwp),
      h("td",{style:{color:r.safety.includes("A3")?"var(--red)":r.safety.includes("2L")?"var(--accent)":"var(--green)"}},r.safety),
      h("td",{style:{color:"var(--dim)",fontSize:"10px"}},r.note)
    );
    tbody.append(tr);
  });
  tbl.append(tbody);c.append(tbl);
}

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(e) { console.log('SW skip:', e); });
}

// PWA Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  render(); // re-render to show install button
});

function showInstallBanner(app) {
  // Only show if not already in standalone mode
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) return;
  
  const banner = h("div", {style:{background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05))",border:"1px solid rgba(245,158,11,.3)",borderRadius:"10px",padding:"14px",marginBottom:"14px",fontSize:"12px",color:"var(--text)"}});
  
  banner.append(h("div",{style:{fontWeight:700,fontSize:"13px",marginBottom:"6px",color:"var(--accent)"}},"📱 Nainstalovat jako aplikaci"));
  
  if (deferredPrompt) {
    // Chrome/Edge – native install
    banner.append(h("div",{style:{color:"var(--dim)",marginBottom:"8px"}},"Klikněte pro instalaci na plochu:"));
    banner.append(h("button",{className:"btn btn-primary btn-sm",onClick:function(){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r){deferredPrompt=null;render();});
    }},"⬇️ Nainstalovat aplikaci"));
  } else {
    // iOS Safari instructions
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      banner.append(h("div",{style:{color:"var(--dim)",lineHeight:"1.7"}},"1. Klepněte na ikonu Sdílet (⬆️ dole)\n2. Srolujte dolů → \"Přidat na plochu\"\n3. Potvrďte → hotovo!"));
    } else {
      banner.append(h("div",{style:{color:"var(--dim)",lineHeight:"1.7"}},"Chrome: Menu (⋮) → \"Nainstalovat aplikaci\" nebo \"Přidat na plochu\"\nSafari: Sdílet → \"Přidat na plochu\""));
    }
  }
  
  banner.append(h("button",{className:"btn btn-sm btn-ghost",style:{marginTop:"8px",fontSize:"10px"},onClick:function(){banner.remove();localStorage.setItem('innteo_hide_install','1');}},"Skrýt"));
  
  if (!localStorage.getItem('innteo_hide_install')) {
    app.insertBefore(banner, app.children[1]); // after header, before tabs
  }
}

render();
</script>
